services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Switch to PostgreSQL by setting DATABASE_URL:
      # DATABASE_URL: postgresql://user:pass@db:5432/cvbuilder
      DATABASE_URL: sqlite:///./data/cvbuilder.db
    volumes:
      - ./data:/app/data
      # Mount your existing YAML files for the import command
      - ../mydata:/app/mydata:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

