# ------------------------------------------------------------------
# Research Statement
# ------------------------------------------------------------------
researchstatement: >-
  I pursue the fundamental laws governing the physical universe, with
  particular focus on the unification of gravitational and electromagnetic
  forces into a single theoretical framework. My research program encompasses
  general relativity, quantum mechanics, statistical mechanics, and
  cosmology. I am especially interested in whether the apparent duality
  between particles and fields can be resolved through a purely geometric
  description of nature.

